name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'web-shop/**'
      - 'web-admin/**'
      - 'cloudfunctions/**'
      - 'local-backend/**'
      - 'deploy/**'
      - 'scripts/**'
      - '.github/workflows/deploy-app.yml'
  pull_request:
    paths:
      - 'web-shop/**'
      - 'web-admin/**'
      - 'cloudfunctions/**'
      - 'local-backend/**'
      - 'deploy/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      env:
        description: '环境'
        required: true
        type: choice
        options: [staging, prod]

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'prod' || 'staging' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV_NAME: ${{ github.event_name == 'push' && 'prod' || (inputs.env || 'staging') }}
      VPS_USER: ubuntu
      DEPLOY_PATH: /opt/mogu_express
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web-shop/package-lock.json
            web-admin/package-lock.json
            local-backend/api/package-lock.json

      - name: Resolve env-specific values
        id: env
        run: |
          ENV=$ENV_NAME
          echo "name=$ENV" >> $GITHUB_OUTPUT
          if [ "$ENV" = "prod" ]; then
            echo "artifact=terraform-outputs-prod" >> $GITHUB_OUTPUT
            echo "appenv_secret=APP_ENV_PROD" >> $GITHUB_OUTPUT
            echo "shop_host=shop.${{ vars.ROOT_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "admin_host=admin.${{ vars.ROOT_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "api_host=api.${{ vars.ROOT_DOMAIN }}" >> $GITHUB_OUTPUT
          else
            echo "artifact=terraform-outputs-staging" >> $GITHUB_OUTPUT
            echo "appenv_secret=APP_ENV_STAGING" >> $GITHUB_OUTPUT
            echo "shop_host=shop-staging.${{ vars.ROOT_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "admin_host=admin-staging.${{ vars.ROOT_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "api_host=api-staging.${{ vars.ROOT_DOMAIN }}" >> $GITHUB_OUTPUT
          fi

      - name: Install + build web-shop
        env:
          VITE_API_BASE: https://${{ steps.env.outputs.api_host }}
        run: |
          cd web-shop
          npm ci
          npm run build -- --mode ${{ steps.env.outputs.name }}

      - name: Install + build web-admin
        env:
          VITE_API_BASE: https://${{ steps.env.outputs.api_host }}
          VITE_USE_MOCK: 'false'
        run: |
          cd web-admin
          npm ci
          npm run build -- --mode ${{ steps.env.outputs.name }}

      - name: Sync shared _lib into cloudfunctions
        run: node scripts/sync-lib.js

      - name: Fetch terraform outputs
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: terraform-apply.yml
          name: ${{ steps.env.outputs.artifact }}
          path: ./tf-outputs
          if_no_artifact_found: fail

      - name: Read VPS IP
        id: vps
        run: |
          VPS_IP=$(jq -r .vps_public_ip.value tf-outputs/outputs.json)
          echo "ip=$VPS_IP" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.vps.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Render .env
        env:
          APP_ENV_PROD:    ${{ secrets.APP_ENV_PROD }}
          APP_ENV_STAGING: ${{ secrets.APP_ENV_STAGING }}
        run: |
          # 选哪份 secret(base64 编码的整 .env 文件)
          if [ "$ENV_NAME" = "prod" ]; then
            echo "$APP_ENV_PROD" | base64 -d > /tmp/app.env
          else
            echo "$APP_ENV_STAGING" | base64 -d > /tmp/app.env
          fi
          # 追加 terraform 输出的动态值(COS 凭证等)
          {
            echo ""
            echo "ENV_NAME=$ENV_NAME"
            echo "SHOP_DOMAIN=${{ steps.env.outputs.shop_host }}"
            echo "ADMIN_DOMAIN=${{ steps.env.outputs.admin_host }}"
            echo "API_DOMAIN=${{ steps.env.outputs.api_host }}"
            echo "S3_BUCKET=$(jq -r .cos_bucket.value tf-outputs/outputs.json)"
            echo "S3_ENDPOINT=$(jq -r .cos_endpoint.value tf-outputs/outputs.json)"
            echo "S3_PUBLIC_URL=$(jq -r .cos_public_url_prefix.value tf-outputs/outputs.json)"
            echo "S3_ACCESS_KEY=$(jq -r .cos_subuser_access_key.value tf-outputs/outputs.json)"
            echo "S3_SECRET_KEY=$(jq -r .cos_subuser_secret_key.value tf-outputs/outputs.json)"
            # Mongo URL 由 docker-compose 内部用 MONGO_ROOT_USER/PASSWORD 拼,
            # 这两个值在 APP_ENV_* secret 里
          } >> /tmp/app.env

      - name: Server bootstrap (docker + 挂载数据盘 + 建 /opt/mogu_express,幂等)
        # 必须在 rsync 之前 —— rsync 目标 /opt/mogu_express 由 server-init.sh 创建并 chown 给 ubuntu
        run: |
          ssh ${{ env.VPS_USER }}@${{ steps.vps.outputs.ip }} 'sudo bash -s' < scripts/server-init.sh

      - name: Rsync code to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '*.tfstate*' \
            --exclude 'terraform/.terraform' \
            ./ ${{ env.VPS_USER }}@${{ steps.vps.outputs.ip }}:${{ env.DEPLOY_PATH }}/

      - name: Push .env
        run: |
          scp /tmp/app.env ${{ env.VPS_USER }}@${{ steps.vps.outputs.ip }}:${{ env.DEPLOY_PATH }}/deploy/.env

      - name: Docker compose up
        run: |
          ssh ${{ env.VPS_USER }}@${{ steps.vps.outputs.ip }} bash <<'EOF'
            set -e
            cd /opt/mogu_express
            sudo docker compose -f deploy/docker-compose.production.yml --env-file deploy/.env up -d --build
            sudo docker compose -f deploy/docker-compose.production.yml ps
          EOF

      - name: Health check
        run: |
          sleep 15
          curl -fsSL --retry 5 --retry-delay 5 \
            https://${{ steps.env.outputs.api_host }}/health || \
            curl -fsSL --retry 3 --retry-delay 5 http://${{ steps.vps.outputs.ip }}:4000/health

      - name: Summary
        run: |
          echo "### Deployed to ${{ steps.env.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Shop: https://${{ steps.env.outputs.shop_host }}" >> $GITHUB_STEP_SUMMARY
          echo "- Admin: https://${{ steps.env.outputs.admin_host }}" >> $GITHUB_STEP_SUMMARY
          echo "- API: https://${{ steps.env.outputs.api_host }}" >> $GITHUB_STEP_SUMMARY
