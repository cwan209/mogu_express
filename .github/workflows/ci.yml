name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ───── 1. 全工程语法检查(快,先跑挡掉低级错误)─────
  syntax:
    name: Syntax check (cloudfunctions + miniprogram)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check-syntax.js

  # ───── 2. 后端集成测试(test-shim.js,18 个 case)─────
  backend-test:
    name: Backend integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: local-backend/api/package-lock.json
      - name: Install local-backend deps
        working-directory: local-backend/api
        run: npm ci
      - name: Run test-shim
        working-directory: local-backend/api
        run: npm test

  # ───── 3. Web admin 类型检查 + 生产构建 ─────
  web-admin:
    name: Web admin (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-admin/package-lock.json
      - name: Install web-admin deps
        working-directory: web-admin
        run: npm ci
      - name: TypeScript check
        working-directory: web-admin
        run: npx tsc -b
      - name: Production build
        working-directory: web-admin
        run: npx vite build

  # ───── 4. 综合 status check(为 branch protection 用)─────
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [syntax, backend-test, web-admin]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.syntax.result }}" != "success" ] || \
             [ "${{ needs.backend-test.result }}" != "success" ] || \
             [ "${{ needs.web-admin.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All jobs passed"
