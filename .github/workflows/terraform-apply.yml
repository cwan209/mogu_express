name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-apply.yml'
  workflow_dispatch:
    inputs:
      env:
        description: '环境(prod 是真生产,谨慎)'
        required: true
        type: choice
        default: staging
        options: [staging, prod]

# push to main → staging apply(默认安全);prod 只能 workflow_dispatch + 显式选择;
# PR 的 plan/diff 见 terraform-plan.yml(只 plan 不 apply)
concurrency:
  group: terraform-apply-${{ inputs.env || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  staging:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.env == 'staging')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_WORKSPACE: mogu-staging
      TENCENTCLOUD_SECRET_ID:    ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY:   ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_env_name:           staging
      TF_VAR_tencent_secret_id:  ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TF_VAR_tencent_secret_key: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_ssh_public_key:     ${{ secrets.SSH_DEPLOY_PUBLIC_KEY }}
      TF_VAR_root_domain:        ${{ vars.ROOT_DOMAIN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id:   ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cvm_instance_type: S5.MEDIUM2
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6
      - run: terraform init
      - run: terraform apply -auto-approve -input=false
      - name: Export outputs
        run: terraform output -json > outputs.json
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-staging
          path: terraform/outputs.json
          retention-days: 30

  # Prod: 只能手动 workflow_dispatch(env=prod)
  prod:
    if: github.event_name == 'workflow_dispatch' && inputs.env == 'prod'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_WORKSPACE: mogu-prod
      TENCENTCLOUD_SECRET_ID:    ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY:   ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_env_name:           prod
      TF_VAR_tencent_secret_id:  ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TF_VAR_tencent_secret_key: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_ssh_public_key:     ${{ secrets.SSH_DEPLOY_PUBLIC_KEY }}
      TF_VAR_root_domain:        ${{ vars.ROOT_DOMAIN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id:   ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cvm_instance_type: S5.MEDIUM4
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6
      - run: terraform init
      - run: terraform apply -auto-approve -input=false
      - name: Export outputs
        run: terraform output -json > outputs.json
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-prod
          path: terraform/outputs.json
          retention-days: 90
