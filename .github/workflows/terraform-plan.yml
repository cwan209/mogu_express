name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_VAR_tencent_secret_id:  ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TF_VAR_tencent_secret_key: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_ssh_public_key:     ${{ secrets.SSH_DEPLOY_PUBLIC_KEY }}
      TF_VAR_root_domain:        ${{ vars.ROOT_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: fmt
        run: terraform fmt -check -recursive

      - name: init
        run: terraform init

      - name: validate
        run: terraform validate

      - name: plan
        id: plan
        run: |
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
          # 截断到 60k 字符给 GH 评论
          head -c 60000 plan.txt > plan.trunc.txt

      - uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const body = '## Terraform Plan\n```\n' +
              fs.readFileSync('terraform/plan.trunc.txt', 'utf8') +
              '\n```';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });
