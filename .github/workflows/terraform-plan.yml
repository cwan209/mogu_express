name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [staging, prod]
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_WORKSPACE: mogu-${{ matrix.env }}
      # COS backend 从这两个 env 读凭证
      TENCENTCLOUD_SECRET_ID:    ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TENCENTCLOUD_SECRET_KEY:   ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      # provider 也用同一对凭证(变量名不同,各取所需)
      TF_VAR_env_name:           ${{ matrix.env }}
      TF_VAR_tencent_secret_id:  ${{ secrets.TENCENTCLOUD_SECRET_ID }}
      TF_VAR_tencent_secret_key: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
      TF_VAR_ssh_public_key:     ${{ secrets.SSH_DEPLOY_PUBLIC_KEY }}
      TF_VAR_root_domain:        ${{ vars.ROOT_DOMAIN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id:   ${{ vars.CLOUDFLARE_ZONE_ID }}
      # staging 用小套餐
      TF_VAR_lighthouse_bundle_id: ${{ matrix.env == 'staging' && 'bundle_starter_lin_1c2g80g_h_intl' || 'bundle_starter_lin_2c4g80g_h_intl' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: fmt
        if: matrix.env == 'staging'   # fmt 跟环境无关,跑一次就行
        run: terraform fmt -check -recursive

      - name: init
        run: terraform init

      - name: validate
        run: terraform validate

      - name: plan
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan-${{ matrix.env }}.txt
          head -c 50000 plan-${{ matrix.env }}.txt > plan-${{ matrix.env }}.trunc.txt

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.env }}';
            const body = '## Terraform Plan — `' + env + '`\n```\n' +
              fs.readFileSync('terraform/plan-' + env + '.trunc.txt', 'utf8') +
              '\n```';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });
