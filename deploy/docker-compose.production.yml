# 生产部署 — 腾讯云轻量 HK 一键栈
#
# 准备:
#   1. VPS 已装 Docker + Docker Compose
#   2. 域名 A 记录指向 VPS 公网 IP(shop / admin / api 三个二级域名)
#   3. 复制 `.env.example` 为 `.env` 并填实际值
#   4. 在仓库根目录跑过 `npm --prefix web-shop run build && npm --prefix web-admin run build`
#      把 dist 上传到 VPS 同目录(或在 VPS 上跑)
#
# 启动:
#   docker compose -f deploy/docker-compose.production.yml --env-file deploy/.env up -d
#
# 生产期建议:
#   - MinIO 换成腾讯云 COS,只改 env(S3_ENDPOINT / S3_PUBLIC_URL / 凭证),其余不动
#   - 关闭 MinIO 服务(注释掉 minio 段),减少资源占用

services:
  # Mongo 单节点容器,数据写到 /data(CVM 数据盘挂载点),
  # 通过 scripts/backup-mongo.sh 每日 dump 到 COS 兜底
  mongo:
    image: mongo:7
    container_name: mogu_mongo
    restart: unless-stopped
    # 单节点 replset(multi-doc transaction 需要)。不开 auth — 容器只在内网
    # docker network 暴露,没有 ports: 映射到宿主;keyFile + auth + replSet
    # 三件套有鸡蛋问题,YAGNI。
    command:
      - --replSet=rs0
      - --bind_ip_all
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /data/mongo:/data/db
    networks: [mogunet]

  minio:
    # 生产用腾讯云 COS 时可注释掉这一段
    image: minio/minio:latest
    container_name: mogu_minio
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks: [mogunet]

  api:
    build: ../local-backend/api
    container_name: mogu_api
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MONGO_URL: mongodb://mongo:27017/mogu_express?replicaSet=rs0
      MONGO_DIRECT_CONNECTION: "1" # 单节点 replset 必须 direct,避免 driver discovery 死循环
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_AUTO_CREATE_BUCKET: "false"
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      JWT_SECRET: ${JWT_SECRET}
      # 公众号 OAuth (wxLogin 云函数用) — staging 用测试号,prod 用海外认证服务号
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      # HuePay
      HUEPAY_STUB: ${HUEPAY_STUB:-1}
      HUEPAY_API_BASE: ${HUEPAY_API_BASE:-}
      HUEPAY_MERCHANT_ID: ${HUEPAY_MERCHANT_ID:-}
      HUEPAY_APP_ID: ${HUEPAY_APP_ID:-}
      HUEPAY_API_KEY: ${HUEPAY_API_KEY:-}
      HUEPAY_SECRET: ${HUEPAY_SECRET:-}
      HUEPAY_NOTIFY_URL: ${HUEPAY_NOTIFY_URL:-}
      PORT: "4000"
    volumes:
      - ../cloudfunctions:/app/cloudfunctions:ro
    depends_on:
      - mongo
    networks: [mogunet]

  caddy:
    image: caddy:2-alpine
    container_name: mogu_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      SHOP_DOMAIN: ${SHOP_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web-shop/dist:/srv/web-shop:ro
      - ../web-admin/dist:/srv/web-admin:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks: [mogunet]

networks:
  mogunet:
    driver: bridge

volumes:
  minio_data:
  caddy_data:
  caddy_config:
