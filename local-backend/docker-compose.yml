services:
  mongo:
    image: mongo:7
    container_name: mogu_mongo
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # 单节点副本集 — 必需才能用 transactions
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: |
        echo 'try { rs.status().ok } catch(e) { rs.initiate({_id:"rs0",members:[{_id:0,host:"localhost:27017"}]}) }' | mongosh --quiet
      interval: 5s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mogu_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: mogu_admin
      MINIO_ROOT_PASSWORD: mogu_admin_pass
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  api:
    build: ./api
    container_name: mogu_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      TZ: Asia/Shanghai
      MONGO_URL: mongodb://mongo:27017/mogu_express?replicaSet=rs0
      # S3 兼容存储(本地 MinIO,生产切腾讯云 COS 只改这些变量)
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: images
      S3_ACCESS_KEY: mogu_admin
      S3_SECRET_KEY: mogu_admin_pass
      S3_PUBLIC_URL: http://localhost:9000/images
      S3_AUTO_CREATE_BUCKET: "true"
      S3_FORCE_PATH_STYLE: "true"
      JWT_SECRET: local_dev_secret_CHANGE_ME
      PORT: "4000"
    volumes:
      # 挂载 cloudfunctions 源码到容器,改代码立即生效(配合 nodemon)
      - ../cloudfunctions:/app/cloudfunctions:ro
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  minio_data:
